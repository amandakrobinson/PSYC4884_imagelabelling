<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Recognition Study</title>

  <!-- jsPsych -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-likert@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --accent: #c8f542;
      --text: #e8e8e8;
      --text-dim: #888;
      --radius: 4px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 300;
    }

    /* override jspsych defaults */
    .jspsych-display-element {
      background: var(--bg) !important;
    }

    .jspsych-content-wrapper {
      background: var(--bg) !important;
    }

    .jspsych-content {
      max-width: 720px;
      padding: 40px 20px;
    }

    /* ── trial layout ── */
    .trial-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .trial-header {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      text-transform: uppercase;
      align-self: flex-start;
    }

    .trial-header span {
      color: var(--accent);
    }

    .image-frame {
      border: 1px solid var(--border);
      background: #111;
      padding: 12px;
      position: relative;
    }

    .image-frame img {
      display: block;
      max-width: 520px;
      max-height: 420px;
      width: auto;
      height: auto;
    }

    .image-frame::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 12px; height: 12px;
      border-top: 2px solid var(--accent);
      border-left: 2px solid var(--accent);
    }

    .image-frame::after {
      content: '';
      position: absolute;
      bottom: -1px; right: -1px;
      width: 12px; height: 12px;
      border-bottom: 2px solid var(--accent);
      border-right: 2px solid var(--accent);
    }

    /* ── questions ── */
    .questions-block {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .question-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .question-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }

    .question-label strong {
      color: var(--text);
      font-weight: 500;
    }

    /* text input */
    .label-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 15px;
      padding: 10px 14px;
      width: 100%;
      box-sizing: border-box;
      transition: border-color 0.15s;
      outline: none;
    }

    .label-input:focus {
      border-color: var(--accent);
    }

    .label-input::placeholder {
      color: #444;
    }

    /* likert scale */
    .likert-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .likert-btn {
      width: 40px;
      height: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.12s;
      flex-shrink: 0;
    }

    .likert-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .likert-btn.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f0f0f;
      font-weight: 500;
    }

    .likert-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.05em;
      margin-top: 4px;
    }

    /* yes/no face buttons */
    .face-row {
      display: flex;
      gap: 12px;
    }

    .face-btn {
      flex: 1;
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.12s;
      text-transform: uppercase;
    }

    .face-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .face-btn.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f0f0f;
      font-weight: 500;
    }

    /* submit */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      color: var(--accent);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 8px;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--accent);
      color: #0f0f0f;
    }

    .submit-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .validation-msg {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #e05555;
      letter-spacing: 0.05em;
      min-height: 16px;
      text-align: center;
    }

    /* ── instructions / end screens ── */
    .info-screen {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 0;
    }

    .info-screen h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .info-screen h2 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 32px;
    }

    .info-screen p {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 16px;
    }

    .info-screen ul {
      padding-left: 0;
      list-style: none;
      margin-bottom: 24px;
    }

    .info-screen ul li {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-dim);
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 12px;
    }

    .info-screen ul li::before {
      content: '→';
      color: var(--accent);
      font-family: 'IBM Plex Mono', monospace;
      flex-shrink: 0;
    }

    .start-btn {
      display: inline-block;
      padding: 14px 40px;
      background: var(--accent);
      color: #0f0f0f;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.15s;
      margin-top: 16px;
    }

    .start-btn:hover { opacity: 0.85; }

    .progress-bar-outer {
      width: 100%;
      height: 2px;
      background: var(--border);
      margin-bottom: 32px;
      border-radius: 2px;
    }

    .progress-bar-inner {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .dl-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.15s;
      z-index: 999;
    }

    .dl-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
<button class="dl-btn" id="global-dl-btn" style="display:none" onclick="downloadCSV('partial')">↓ Save progress</button>
<script>
// ─────────────────────────────────────────────
// CONFIG — edit these
// ─────────────────────────────────────────────
const IMAGE_FOLDER   = 'images/';     // path relative to index.html
const IMAGES_JSON    = 'images.json'; // JSON file listing image filenames
const AUTO_SAVE_EVERY = 50;           // download CSV every N images (0 to disable)

// ─────────────────────────────────────────────
// LOCALSTORAGE AUTOSAVE
// ─────────────────────────────────────────────
const STORAGE_KEY = 'image_recognition_data';

function saveToStorage() {
  const rows = jsPsych.data.get().filter({trial_type_custom: 'image_trial'}).values();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(rows));
}

function loadFromStorage() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : [];
  } catch(e) {
    return [];
  }
}

function clearStorage() {
  localStorage.removeItem(STORAGE_KEY);
}

function downloadCSV(suffix) {
  const pid = jsPsych.data.get().filter({trial_type_custom: 'image_trial'}).values()[0]?.participant_id || 'unknown';
  jsPsych.data.get().filter({trial_type_custom: 'image_trial'}).localSave('csv', `sub-${pid}_${suffix}.csv`);
}

function maybePeriodicallyDownload(trialIndex) {
  if (AUTO_SAVE_EVERY > 0 && trialIndex > 0 && trialIndex % AUTO_SAVE_EVERY === 0) {
    downloadCSV(`after_${trialIndex}`);
  }
}

function rowsToCSV(rows) {
  if (!rows.length) return '';
  const cols = ['image','label','confidence','face','rt'];
  const header = cols.join(',');
  const lines = rows.map(r =>
    cols.map(c => JSON.stringify(r[c] ?? '')).join(',')
  );
  return [header, ...lines].join('\n');
}

// ─────────────────────────────────────────────
// INIT jsPsych
// ─────────────────────────────────────────────
const jsPsych = initJsPsych({
  on_finish: function() {
    downloadCSV('complete');
    clearStorage();
  }
});

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─────────────────────────────────────────────
// MAIN — load image list then build timeline
// ─────────────────────────────────────────────
fetch(IMAGES_JSON)
  .then(r => r.json())
  .then(imageList => {
    const images = shuffle(imageList);
    const total  = images.length;

    // check for saved progress
    const saved = loadFromStorage();
    const completedImages = new Set(saved.map(r => r.image));
    const resuming = saved.length > 0;
    const savedPid = resuming && saved[0].participant_id ? saved[0].participant_id : null;

    // restore saved trials into jsPsych data
    if (resuming) {
      saved.forEach(row => jsPsych.data.write(row));
    }

    // ── Participant ID screen (skip if resuming — we already have it) ──
    let participantId = savedPid || '';

    const pid_screen = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="info-screen">
          <h1>Image Recognition Study</h1>
          <h2>Before you begin</h2>
          <p>Please enter your participant ID or student number below. This is used to name your data file — it will not be used to identify you personally.</p>
          <div class="question-row" style="margin-top:8px">
            <input class="label-input" type="text" id="pid-input" placeholder="e.g. s1234567" autocomplete="off" style="font-size:16px">
          </div>
          <div class="validation-msg" id="pid-val" style="margin-top:8px"></div>
        </div>`,
      choices: ['Continue'],
      button_html: '<button class="start-btn" id="pid-continue-btn">%choice%</button>',
      on_load: function() {
        const btn = document.querySelector('.start-btn');
        const input = document.getElementById('pid-input');
        btn.disabled = true;
        btn.style.opacity = '0.3';
        input.addEventListener('input', () => {
          const ok = input.value.trim().length > 0;
          btn.disabled = !ok;
          btn.style.opacity = ok ? '1' : '0.3';
          if (ok) participantId = input.value.trim();
        });
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter' && input.value.trim().length > 0) btn.click();
        });
      },
      on_finish: function() {
        jsPsych.data.addProperties({ participant_id: participantId });
      }
    };

    // ── Instructions ──
    const resumeBanner = resuming ? `
      <div style="background:#1a2a00;border:1px solid var(--accent);border-radius:4px;padding:14px 18px;margin-bottom:24px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent);">
        ↩ Saved progress found — resuming from image ${saved.length + 1} of ${total}
      </div>` : '';

    const instructions = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="info-screen">
          <h1>Image Recognition Study</h1>
          <h2>Participant Task</h2>
          ${resumeBanner}
          <p>You will be shown a series of images, one at a time. For each image, please answer three short questions:</p>
          <ul>
            <li>What object or scene does the image show? Type your best label.</li>
            <li>How confident are you in that label? (1 = not at all, 7 = completely certain)</li>
            <li>Do you see a face anywhere in the image?</li>
          </ul>
          <p>There are <strong>${total} images</strong> in total. Work at your own pace — there is no time limit per image.</p>
          <p>Your responses are saved automatically as you go — if your browser closes, you can return to this page and resume where you left off.</p>
        </div>`,
      choices: [resuming ? 'Resume' : 'Begin'],
      button_html: '<button class="start-btn">%choice%</button>',
    };

    // ── Build one trial per image, skipping already completed ──
    const trials = images
      .filter(filename => !completedImages.has(filename))
      .map((filename, idx) => ({
        type: jsPsychHtmlButtonResponse,
        stimulus: buildTrialHTML(filename, saved.length + idx, total),
        choices: [],
        on_load: function() { attachTrialHandlers(filename, idx, saved.length); },
        data: { trial_type_custom: 'image_trial', image: filename }
      }));

    // ── End screen ──
    const end_screen = {
      type: jsPsychHtmlButtonResponse,
      stimulus: `
        <div class="info-screen">
          <h1>All done.</h1>
          <h2>Thank you</h2>
          <p>Your responses are being saved as a CSV file now. Please send this file to the researcher as instructed.</p>
          <p>You can close this window.</p>
        </div>`,
      choices: ['Download my data'],
      button_html: '<button class="start-btn">%choice%</button>',
    };

    const firstScreens = resuming ? [instructions] : [pid_screen, instructions];
    jsPsych.run([...firstScreens, ...trials, end_screen]);
  })
  .catch(err => {
    document.body.innerHTML = `<div style="color:#e05555;font-family:monospace;padding:40px">
      Error loading images.json: ${err}<br><br>
      Make sure images.json exists in the same folder as index.html.
    </div>`;
  });

// ─────────────────────────────────────────────
// BUILD TRIAL HTML
// ─────────────────────────────────────────────
function buildTrialHTML(filename, idx, total) {
  const pct = Math.round((idx / total) * 100);
  return `
    <div class="trial-container">
      <div style="width:100%">
        <div class="progress-bar-outer">
          <div class="progress-bar-inner" style="width:${pct}%"></div>
        </div>
        <div class="trial-header">Image <span>${idx + 1}</span> of <span>${total}</span></div>
      </div>

      <div class="image-frame">
        <img src="${IMAGE_FOLDER}${filename}" alt="stimulus image" id="stim-img">
      </div>

      <div class="questions-block">

        <!-- Q1: label -->
        <div class="question-row">
          <div class="question-label"><strong>1. What does this image show?</strong> Type your best label.</div>
          <input class="label-input" type="text" id="q-label" placeholder="e.g. dog, traffic light, park bench…" autocomplete="off">
        </div>

        <!-- Q2: confidence -->
        <div class="question-row">
          <div class="question-label"><strong>2. How confident are you in that label?</strong></div>
          <div class="likert-row" id="q-confidence">
            ${[1,2,3,4,5,6,7].map(n =>
              `<button class="likert-btn" data-val="${n}">${n}</button>`
            ).join('')}
          </div>
          <div class="likert-labels">
            <span>Not at all sure</span>
            <span>Completely sure</span>
          </div>
        </div>

        <!-- Q3: face -->
        <div class="question-row">
          <div class="question-label"><strong>3. Do you see a face in this image?</strong></div>
          <div class="face-row" id="q-face">
            <button class="face-btn" data-val="yes">Yes</button>
            <button class="face-btn" data-val="no">No</button>
          </div>
        </div>

        <div class="validation-msg" id="val-msg"></div>
        <button class="submit-btn" id="submit-btn" disabled>Next image →</button>

      </div>
    </div>`;
}

// ─────────────────────────────────────────────
// ATTACH HANDLERS (runs after each trial loads)
// ─────────────────────────────────────────────
function attachTrialHandlers(filename, idx, completedCount) {
  // show the persistent download button once trials begin
  document.getElementById('global-dl-btn').style.display = 'block';

  const state = { label: '', confidence: null, face: null };

  const labelInput  = document.getElementById('q-label');
  const submitBtn   = document.getElementById('submit-btn');
  const valMsg      = document.getElementById('val-msg');

  function checkComplete() {
    const ok = state.label.trim().length > 0 && state.confidence !== null && state.face !== null;
    submitBtn.disabled = !ok;
    if (ok) valMsg.textContent = '';
  }

  // label
  labelInput.addEventListener('input', () => {
    state.label = labelInput.value;
    checkComplete();
  });

  // confidence likert
  document.querySelectorAll('#q-confidence .likert-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#q-confidence .likert-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.confidence = parseInt(btn.dataset.val);
      checkComplete();
    });
  });

  // face yes/no
  document.querySelectorAll('#q-face .face-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#q-face .face-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.face = btn.dataset.val;
      checkComplete();
    });
  });

  // submit
  submitBtn.addEventListener('click', () => {
    if (state.label.trim() === '' || state.confidence === null || state.face === null) {
      valMsg.textContent = 'Please answer all three questions before continuing.';
      return;
    }
    // write responses into jsPsych data for this trial
    jsPsych.data.write({
      label: state.label.trim(),
      confidence: state.confidence,
      face: state.face,
    });
    saveToStorage();
    maybePeriodicallyDownload(completedCount + idx + 1);
    jsPsych.finishTrial();
  });
}
</script>
</body>
</html>
