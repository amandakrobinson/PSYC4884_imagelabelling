<!DOCTYPE html>
<html>
<head>
<script src="https://unpkg.com/jspsych@7.3.4"></script>
<script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
<link rel="stylesheet" href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css">
</head>
<body>
<script>
const jsPsych = initJsPsych();

const trial = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div>
      <p id="status">confidence: null, face: null</p>
      <div id="conf">
        <div data-val="1" role="button" style="border:1px solid black;display:inline-block;padding:8px;cursor:pointer">1</div>
        <div data-val="2" role="button" style="border:1px solid black;display:inline-block;padding:8px;cursor:pointer">2</div>
      </div>
      <div id="face">
        <div data-val="yes" role="button" style="border:1px solid black;display:inline-block;padding:8px;cursor:pointer">Yes</div>
        <div data-val="no" role="button" style="border:1px solid black;display:inline-block;padding:8px;cursor:pointer">No</div>
      </div>
    </div>`,
  choices: [],
  on_load: function() {
    let conf = null, face = null;
    document.querySelectorAll('#conf [role=button]').forEach(el => {
      el.addEventListener('click', () => {
        conf = el.dataset.val;
        document.getElementById('status').textContent = `confidence: ${conf}, face: ${face}`;
      });
    });
    document.querySelectorAll('#face [role=button]').forEach(el => {
      el.addEventListener('click', () => {
        face = el.dataset.val;
        document.getElementById('status').textContent = `confidence: ${conf}, face: ${face}`;
      });
    });
  }
};

jsPsych.run([trial]);
</script>
</body>
</html>
